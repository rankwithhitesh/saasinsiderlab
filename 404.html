<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 - Page Not Found | SaasInsiderLab</title>

    <meta name="robots" content="noindex">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png">

</head>

<body>

    <section class="privacy-section">

        <div class="blur one"></div>
        <div class="blur two"></div>

        <div class="container privacy-container">

            <div class="privacy-card" style="text-align:center;">

                <div class="badge">
                    <span>⚠️ Page Not Found</span>
                </div>

                <h1 style="font-size:72px; margin-top:20px;">
                    404
                </h1>

                <p style="margin-top:20px;">
                    Sorry, the page you are looking for does not exist
                    or may have been moved.
                </p>

                <a href="./" class="primary-btn privacy-btn" style="margin-top:30px;">
                    Back To Homepage
                </a>

            </div>

        </div>

    </section>

</body>

</html>
